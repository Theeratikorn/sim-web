<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการระบบ Admin - Grow Up Study</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">Grow Up Study <span class="role-badge admin">(Admin)</span></a>
            <div class="nav-links" id="auth-nav"></div>
        </div>
    </header>

    <main class="container main-content" style="max-width: 900px;">
        <h2 class="page-title">จัดการระบบ Admin</h2>

        <!-- Change Password -->
        <div class="card admin-section">
            <h3 class="admin-section-title">🔒 เปลี่ยนรหัสผ่านแอดมิน</h3>
            <form id="change-pwd-form">
                <div class="form-group">
                    <label>รหัสผ่านเดิม</label>
                    <input type="password" id="pwd-old" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>รหัสผ่านใหม่</label>
                    <input type="password" id="pwd-new" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-outline">เปลี่ยนรหัสผ่าน</button>
            </form>
        </div>

        <!-- Create Course -->
        <div class="card admin-section" style="border-left: 4px solid #2ecc71;">
            <h3 class="admin-section-title">➕ สร้างคอร์สเรียนใหม่</h3>
            <form id="add-course-form">
                <div class="form-group">
                    <label>ชื่อคอร์ส</label>
                    <input type="text" id="c-title" class="form-control" placeholder="เช่น ฟิสิกส์ ม.5" required>
                </div>
                <div class="form-group">
                    <label>รายละเอียดคอร์ส</label>
                    <textarea id="c-desc" class="form-control" rows="2" placeholder="อธิบายสั้นๆ" required></textarea>
                </div>
                <div class="form-group">
                    <label>อายุคอร์ส (วัน) *ปล่อยว่างถ้าให้เรียนได้ตลอดชีพ</label>
                    <input type="number" id="c-duration" class="form-control" placeholder="เช่น 30">
                </div>
                <button type="submit" class="btn btn-success">สร้างคอร์ส</button>
            </form>
        </div>

        <!-- Add Video -->
        <div class="card admin-section" style="border-left: 4px solid var(--color-primary);">
            <h3 class="admin-section-title">🎬 เพิ่มวิดีโอ (YouTube)</h3>
            <form id="add-video-form">
                <div class="form-group">
                    <label>เลือกคอร์ส</label>
                    <select id="v-courseId" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label>ชื่อบทเรียน / วิดีโอ</label>
                    <input type="text" id="v-title" class="form-control" placeholder="เช่น Ep.4 - กฎของนิวตัน" required>
                </div>
                <div class="form-group">
                    <label>รหัส YouTube (Video ID)</label>
                    <input type="text" id="v-videoId" class="form-control" placeholder="เช่น dQw4w9WgXcQ" required>
                </div>
                <div class="form-group">
                    <label>ลิงก์เอกสารประกอบการเรียน (ถ้ามี)</label>
                    <input type="text" id="v-documentUrl" class="form-control" placeholder="ลิงก์ Google Drive หรือ PDF">
                </div>
                <button type="submit" class="btn btn-primary">เพิ่มวิดีโอ</button>
            </form>
        </div>

        <!-- Pending Enrollments -->
        <div class="card admin-section" style="border-left: 4px solid #f39c12;">
            <h3 class="admin-section-title">📋 คำขอลงทะเบียนเรียน</h3>
            <div id="pending-list"></div>
        </div>

        <!-- Manage Content -->
        <div class="card admin-section" style="border-left: 4px solid #16a085;">
            <h3 class="admin-section-title">📚 จัดการเนื้อหา</h3>
            <div id="content-manage-list"></div>
        </div>

        <!-- Manage Active -->
        <div class="card admin-section" style="border-left: 4px solid #e74c3c;">
            <h3 class="admin-section-title">✅ การเข้าถึงคอร์ส (Active)</h3>
            <div id="active-list"></div>
        </div>

        <!-- Manage Users -->
        <div class="card admin-section" style="border-left: 4px solid #9b59b6;">
            <h3 class="admin-section-title">👥 จัดการผู้ใช้งาน</h3>
            <div id="users-list"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Grow Up Study. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        async function fetchPendingEnrollments() {
            try {
                const res = await fetch(`${API_URL}/admin/enrollments`, { headers: getAuthHeaders() });
                if (res.ok) {
                    const pending = await res.json();
                    const container = document.getElementById('pending-list');
                    if (pending.length === 0) {
                        container.innerHTML = '<p class="text-muted">ไม่มีคำขอใหม่</p>';
                        return;
                    }
                    container.innerHTML = pending.map(e => `
                        <div class="item-badge-row">
                            <span><strong>${e.username}</strong> - ${e.courseTitle}</span>
                            <button onclick="approveEnrollment(${e.id})" class="btn btn-sm btn-success">✅ อนุมัติ</button>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        window.approveEnrollment = async function(id) {
            const res = await fetch(`${API_URL}/admin/enrollments/${id}/approve`, { method: 'POST', headers: getAuthHeaders() });
            if (res.ok) { alert('อนุมัติสำเร็จ!'); fetchPendingEnrollments(); }
        };

        async function fetchActiveEnrollments() {
            try {
                const res = await fetch(`${API_URL}/admin/enrollments/active`, { headers: getAuthHeaders() });
                if (res.ok) {
                    const active = await res.json();
                    const container = document.getElementById('active-list');
                    if (active.length === 0) {
                        container.innerHTML = '<p class="text-muted">ไม่มีการลงทะเบียนที่ active</p>';
                        return;
                    }
                    container.innerHTML = active.map(e => `
                        <div class="item-badge-row">
                            <span><strong>${e.username}</strong> - ${e.courseTitle}</span>
                            <button onclick="deleteEnrollment(${e.id})" class="btn btn-sm btn-danger-outline">❌ ลบ</button>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        window.deleteEnrollment = async function(id) {
            if (!confirm('ยืนยันการลบ?')) return;
            await fetch(`${API_URL}/admin/enrollments/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
            fetchActiveEnrollments();
        };

        async function fetchUsers() {
            try {
                const res = await fetch(`${API_URL}/admin/users`, { headers: getAuthHeaders() });
                if (res.ok) {
                    const users = await res.json();
                    const container = document.getElementById('users-list');
                    container.innerHTML = users.map(u => `
                        <div class="item-badge-row">
                            <span><strong>${u.username}</strong> (${u.role})</span>
                            <select onchange="changeRole(${u.id}, this.value)" class="form-control" style="width:auto;">
                                <option value="student" ${u.role==='student'?'selected':''}>นักเรียน</option>
                                <option value="teacher" ${u.role==='teacher'?'selected':''}>ครู</option>
                                <option value="admin" ${u.role==='admin'?'selected':''}>แอดมิน</option>
                            </select>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        window.changeRole = async function(id, role) {
            await fetch(`${API_URL}/admin/users/${id}/role`, {
                method: 'PUT',
                headers: getAuthHeaders(),
                body: JSON.stringify({ role })
            });
            fetchUsers();
        };

        function renderContentManage() {
            const container = document.getElementById('content-manage-list');
            if (courses.length === 0) { container.innerHTML = '<p class="text-muted">ยังไม่มีคอร์สเรียน</p>'; return; }
            let html = '';
            courses.forEach(c => {
                html += `
                <div class="course-card-admin">
                    <div class="admin-section-header">
                        <h4 style="margin:0;">📚 ${c.title}</h4>
                        <div>
                            <button onclick="deleteCourse(${c.id})" class="btn btn-sm btn-danger-outline">🗑️ ลบ</button>
                        </div>
                    </div>
                    ${c.cover_url ? `<img src="${c.cover_url}" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-bottom:10px;">` : ''}
                    <p style="font-size:0.9rem;margin-bottom:10px;">${c.description}</p>
                    <div style="border-left:2px dashed rgba(255,255,255,0.1);padding-left:15px;">
                        <p style="font-size:0.85rem;color:#aaa;">วิดีโอ (${c.lessons?.length || 0})</p>`;
                c.lessons?.forEach(l => {
                    html += `<div class="item-badge-row"><span>▶️ ${l.title}</span><button onclick="deleteLesson(${l.id})" class="btn btn-sm btn-danger-outline">ลบ</button></div>`;
                });
                html += `<p style="font-size:0.85rem;color:#aaa;margin-top:10px;">โปรแกรมจำลอง (${c.simulations?.length || 0})</p>`;
                c.simulations?.forEach(s => {
                    html += `<div class="item-badge-row"><span>🖥️ ${s.title}</span><button onclick="deleteSim(${s.id})" class="btn btn-sm btn-danger-outline">ลบ</button></div>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        window.deleteCourse = async function(id) {
            if(!confirm('คำเตือน: ลบคอร์สจะลบทุกอย่าง!')) return;
            await fetch(`${API_URL}/courses/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
            fetchCourses();
        };

        window.deleteLesson = async function(id) {
            if(!confirm('ลบวิดีโอนี้?')) return;
            await fetch(`${API_URL}/lessons/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
            fetchCourses();
        };

        window.deleteSim = async function(id) {
            if(!confirm('ลบโปรแกรมจำลองนี้?')) return;
            await fetch(`${API_URL}/simulations/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
            fetchCourses();
        };

        document.addEventListener('coursesLoaded', async () => {
            renderContentManage();
            fetchPendingEnrollments();
            fetchActiveEnrollments();
            fetchUsers();
        });

        document.addEventListener('DOMContentLoaded', async () => {
            renderContentManage();
            fetchPendingEnrollments();
            fetchActiveEnrollments();
            fetchUsers();

            // Course form
            document.getElementById('add-course-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('c-title').value;
                const description = document.getElementById('c-desc').value;
                const durationDays = document.getElementById('c-duration').value;
                const res = await fetch(`${API_URL}/courses`, { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ title, description, durationDays }) });
                if (res.ok) { alert('สร้างคอร์สสำเร็จ!'); e.target.reset(); fetchCourses(); }
            });

            // Password change
            document.getElementById('change-pwd-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const oldPassword = document.getElementById('pwd-old').value;
                const newPassword = document.getElementById('pwd-new').value;
                const res = await fetch(`${API_URL}/admin/password`, { method: 'PUT', headers: getAuthHeaders(), body: JSON.stringify({ oldPassword, newPassword }) });
                const data = await res.json();
                if (res.ok) { alert('เปลี่ยนรหัสผ่านสำเร็จ!'); e.target.reset(); }
                else alert(data.error || 'เกิดข้อผิดพลาด');
            });

            // Video form
            document.getElementById('add-video-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const cId = parseInt(document.getElementById('v-courseId').value);
                const title = document.getElementById('v-title').value;
                let videoId = document.getElementById('v-videoId').value;
                const documentUrl = document.getElementById('v-documentUrl').value;
                const match = videoId.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
                if (match && match[2].length === 11) videoId = match[2];
                const res = await fetch(`${API_URL}/courses/${cId}/lessons`, { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ title, videoId, documentUrl }) });
                if (res.ok) { alert('เพิ่มวิดีโอสำเร็จ!'); e.target.reset(); fetchCourses(); }
            });

            // Populate course select
            const populateCourseSelect = setInterval(() => {
                if (typeof courses !== 'undefined' && courses.length > 0) {
                    clearInterval(populateCourseSelect);
                    const select = document.getElementById('v-courseId');
                    select.innerHTML = courses.map(c => `<option value="${c.id}">${c.title}</option>`).join('');
                }
            }, 100);
        });
    </script>
</body>
</html>
