<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คอร์สเรียนทั้งหมด - Grow Up Study</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">Grow Up Study</a>
            <div class="nav-links" id="auth-nav">
                <!-- Auth buttons injected by app.js -->
            </div>
        </div>
    </header>

    <main class="container" style="padding: 40px 0; flex: 1;">
        <h2 class="mb-4">คอร์สเรียนของคุณ</h2>
        <div class="grid grid-cols-2" id="course-list">
            <!-- Courses will be injected here by JS -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Grow Up Study. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        function renderCourses() {
            const courseList = document.getElementById('course-list');
            if (courses.length === 0) return;
            
            let html = '';
            courses.forEach(course => {
                let actionButton = '';
                let expireText = '';

                if (course.enrollmentStatus === 'approved') {
                    if (course.isExpired) {
                        actionButton = `<button onclick="enrollCourse(${course.id})" class="btn btn-outline" style="border-color: #e74c3c; color: #e74c3c;">❌ หมดอายุแล้ว (กดลงทะเบียนใหม่)</button>`;
                        expireText = '<p style="color:#e74c3c; font-size: 0.8rem; margin: 0;">คอร์สนี้หมดอายุไปแล้วเมื่อ ' + new Date(course.expiresAt).toLocaleDateString() + '</p>';
                    } else {
                        actionButton = `<a href="course-detail.html?courseId=${course.id}" class="btn btn-primary">▶️ ดูเนื้อหาคอร์ส</a>`;
                        if (course.expiresAt) {
                            expireText = '<p style="color:#f39c12; font-size: 0.8rem; margin: 0;">⏳ หมดอายุวันที่: ' + new Date(course.expiresAt).toLocaleDateString() + '</p>';
                        } else {
                            expireText = '<p style="color:#2ecc71; font-size: 0.8rem; margin: 0;">✨ เรียนได้ตลอดชีพ</p>';
                        }
                    }
                } else if (course.enrollmentStatus === 'pending') {
                    actionButton = `<button class="btn btn-outline" style="border-color: #f39c12; color: #f39c12; cursor: not-allowed;" disabled>⏳ รอแอดมินอนุมัติ</button>`;
                } else {
                    actionButton = `<button onclick="enrollCourse(${course.id})" class="btn btn-outline" style="border-color: var(--color-primary); color: var(--color-primary);">➕ ลงทะเบียนเรียน</button>`;
                }

                html += `
                    <div class="col-md-6 mb-4">
                        <div class="card">
                            <h3>${course.title}</h3>
                            <p class="mt-2 text-muted" style="margin-bottom: 5px;">${course.description}</p>
                            ${expireText}
                            <div style="margin-top: 15px;">
                                ${actionButton}
                            </div>
                        </div>
                    </div>
                `;
            });
            courseList.innerHTML = html;
        }

        document.addEventListener('coursesLoaded', renderCourses);
        document.addEventListener('DOMContentLoaded', () => {
            if (courses.length > 0) renderCourses();
        });
    </script>
</body>
</html>
