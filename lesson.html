<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ห้องเรียน - Grow Up Study</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 24px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .lesson-header {
            margin-bottom: 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--text-muted);
        }
        .back-link:hover {
            color: var(--color-primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">Grow Up Study</a>
            <div class="nav-links" id="auth-nav"></div>
        </div>
    </header>

    <main class="container" style="padding: 40px 0; flex: 1; max-width: 900px;">
        <a href="courses.html" id="back-btn" class="back-link">&larr; กลับไปหน้าสารบัญเนื้อหา</a>
        
        <div id="lesson-content">
            <p class="text-center">กำลังโหลดเนื้อหา...</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Grow Up Study. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        function renderLesson() {
            const courseId = parseInt(getQueryParam('courseId'));
            const itemId = parseInt(getQueryParam('itemId'));
            const type = getQueryParam('type');
            const lessonContent = document.getElementById('lesson-content');
            const backBtn = document.getElementById('back-btn');

            if (!courseId || !itemId || !type) {
                lessonContent.innerHTML = '<p class="text-center" style="color: red;">ไม่พบข้อมูล กรุณากลับไปเลือกใหม่</p>';
                return;
            }

            const course = courses.find(c => c.id === courseId);
            if (!course) {
                lessonContent.innerHTML = '<p class="text-center" style="color: red;">ไม่พบคอร์สที่ต้องการ</p>';
                return;
            }

            if (course.enrollmentStatus !== 'approved' || course.isExpired) {
                alert('คอร์สนี้ยังไม่ได้รับการอนุมัติ หรือหมดอายุไปแล้วครับ');
                window.location.href = 'courses.html';
                return;
            }

            const user = getCurrentUser();
            if (type === 'video' && user && user.role === 'teacher') {
                lessonContent.innerHTML = `
                    <div class="text-center" style="padding: 50px;">
                        <h2 style="color: #e74c3c;">🔒 เข้าถึงไม่ได้</h2>
                        <p class="mt-2 text-muted">เนื้อหาวิดีโอสงวนสิทธิ์ไว้สำหรับบัญชีนักเรียนเท่านั้น<br>คุณครูสามารถเข้าใช้งานได้เฉพาะโปรแกรมจำลอง (Simulation) ครับ</p>
                        <a href="course-detail.html?courseId=${course.id}" class="btn btn-outline mt-2">กลับไปหน้าสารบัญ</a>
                    </div>
                `;
                return;
            }

            // ตั้งค่าลิงก์ย้อนกลับให้กลับไปหน้าสารบัญของคอร์สนั้นๆ
            backBtn.href = `course-detail.html?courseId=${course.id}`;

            let item;
            let iframeHtml = '';

            if (type === 'video') {
                item = course.lessons.find(l => l.id === itemId);
                if (item) {
                    // Support both video_id (from DB) and videoId (camelCase) 
                    let rawId = item.video_id || item.videoId || '';
                    
                    // Extract video ID if it's a full URL
                    const match = rawId.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
                    const parsedVideoId = (match && match[2].length === 11) ? match[2] : rawId;

                    iframeHtml = `
                        <div class="video-container">
                            <iframe 
                                src="https://www.youtube.com/embed/${parsedVideoId}" 
                                title="YouTube video player" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen>
                            </iframe>
                        </div>
                    `;
                    
                    let buttonsHtml = '<div style="margin-top: 20px; display: flex; gap: 15px; flex-wrap: wrap;">';
                    
                    if (item.document_url) {
                        buttonsHtml += `<a href="${item.document_url}" target="_blank" class="btn btn-outline" style="border-color: #3498db; color: #3498db;">📄 ดาวน์โหลดชีทเรียน</a>`;
                    }
                    
                    if (item.isCompleted) {
                        buttonsHtml += `<button class="btn btn-outline" style="border-color: #2ecc71; color: #2ecc71; cursor: not-allowed;" disabled>✅ เรียนจบแล้ว</button>`;
                    } else {
                        buttonsHtml += `<button onclick="markLessonComplete(${item.id})" class="btn btn-primary" style="background: #2ecc71; border-color: #2ecc71;">✔️ ทำเครื่องหมายว่าเรียนจบแล้ว</button>`;
                    }
                    
                    buttonsHtml += '</div>';
                    iframeHtml += buttonsHtml;
                }
            } else if (type === 'sim') {
                item = course.simulations.find(s => s.id === itemId);
                if (item) {
                    iframeHtml = `
                        <div style="width: 100%; height: 600px; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3); background-color: white;">
                            <iframe 
                                src="${item.fileUrl}" 
                                style="width: 100%; height: 100%; border: none;"
                                title="${item.title}">
                            </iframe>
                        </div>
                    `;
                }
            }

            if (item) {
                lessonContent.innerHTML = `
                    <div class="lesson-header">
                        <h2>${item.title}</h2>
                        <p class="text-muted mt-2">ส่วนหนึ่งของคอร์ส: ${course.title}</p>
                    </div>
                    ${iframeHtml}
                `;
            } else {
                lessonContent.innerHTML = '<p class="text-center" style="color: red;">ไม่พบเนื้อหาที่ต้องการ</p>';
            }
        }

        document.addEventListener('coursesLoaded', renderLesson);
        document.addEventListener('DOMContentLoaded', () => {
            if (courses.length > 0) renderLesson();
        });
    </script>
</body>
</html>
