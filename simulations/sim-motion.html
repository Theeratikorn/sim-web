<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมจำลอง: การเคลื่อนที่ 1 มิติ</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #f0f4f8; text-align: center; }
        .box { width: 50px; height: 50px; background-color: #A855F7; margin: 50px auto; border-radius: 8px; transition: transform 0.5s ease; }
        button { padding: 10px 20px; background-color: #1F2A60; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>จำลองการเคลื่อนที่แนวตรง</h2>
    <p>กดปุ่มเพื่อดูการเคลื่อนที่ซ้าย-ขวา</p>
    <div class="box" id="box"></div>
    <button onclick="move(-100)">ไปทางซ้าย</button>
    <button onclick="move(100)">ไปทางขวา</button>
    <script>
        let pos = 0;
        function move(dist) {
            pos += dist;
            document.getElementById('box').style.transform = `translateX(${pos}px)`;
        }
    </script>
</body>
</html>
